
# ==========================================
# Arquivo de origem: root.graphqls
# ==========================================

scalar BigDecimal
scalar Date
scalar DateTime

type Query {
    _ping: String
}

type Mutation {
    _ping: String
}

interface Page {
    totalPages: Int!
    totalElements: Int!
    size: Int!
    number: Int!
}

input   PageRequestInput {
    page: Int = 0
    size: Int = 10
}


# ==========================================
# Arquivo de origem: marketdata\vna\vna.graphqls
# ==========================================

enum FetchStrategy {
    LOCAL_ONLY
    REMOTE_ONLY
    FALLBACK_NO_SAVE
    FALLBACK_AND_SAVE
}

type Vna {
    id: ID
    security: String
    selicCode: String
    referenceDate: Date
    price: BigDecimal
    indexValue: BigDecimal
    status: String
    createdAt: DateTime
}

extend type Query {
    vna(date: Date, strategy: FetchStrategy, ignoreCache: Boolean): [Vna]!
}


# ==========================================
# Arquivo de origem: identity\users\user\user.graphqls
# ==========================================

type User {
    id: ID!
    name: String!
    email: String!
    status: String!
    createdAt: DateTime!
    updatedAt: DateTime!

    emails(statuses: [EmailStatus!], pageRequest: PageRequestInput): EmailPage!
    addresses(isPrimary: Boolean, pageRequest: PageRequestInput): UserAddressPage!
}

extend type Query {
    user(id: ID!): User
}


# ==========================================
# Arquivo de origem: identity\users\useremail\useremail.graphqls
# ==========================================

enum EmailStatus {
    ACTIVE
    INACTIVE
    UNVERIFIED
    OUTDATED
    WRONG_PERSON
    INVALID
}

type Email {
    id: ID!
    user: User!
    type: String!
    email: String!
    isPrimary: Boolean!
    createdAt: DateTime!
    updatedAt: DateTime!
    status: EmailStatus!
}

type EmailPage implements Page {
    content: [Email!]!

    totalPages: Int!
    totalElements: Int!
    size: Int!
    number: Int!
}



# ==========================================
# Arquivo de origem: identity\users\user\useraddress\useraddress.graphqls
# ==========================================

type UserAddress {
    id: ID!
    user: User!
    street: String!
    number: String!
    complement: String
    neighborhood: String
    city: String
    state: String
    zipCode: String
    country: String
    isPrimary: Boolean!
    createdAt: DateTime!
    updatedAt: DateTime!
}

type UserAddressPage implements Page{
    content: [UserAddress!]!

    totalPages: Int!
    totalElements: Int!
    size: Int!
    number: Int!
}

extend type Query {
    userAddress(id: ID!): UserAddress
}

