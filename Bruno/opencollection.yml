opencollection: 1.0.0

info:
  name: Bruno
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  auth:
    type: bearer
    token: "{{JWT_TOKEN}}"
bundled: false
extensions:
  bruno:
    presets:
      request:
        type: http
