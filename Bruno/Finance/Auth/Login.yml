info:
  name: Login
  type: http
  seq: 1
  tags:
    - Autenticacao

http:
  method: POST
  url: "{{LOCALHOST}}/v1/finance/login"
  body:
    type: json
    data: |-
      {
        "email" : "luiz.palma@email.com",
        "password" : "senha123"
      }

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        if (res.getStatus() === 200 && body.token) {
          
          bru.setEnvVar("JWT_TOKEN", body.token);
          
          console.log("Token salvo com sucesso!");

        } else {
          console.log("Não foi possível capturar o token. Verifique o retorno da API.");
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
