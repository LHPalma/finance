info:
  name: Pegar VNA
  type: graphql
  seq: 4

graphql:
  method: POST
  url: "{{LOCALHOST}}/v1/finance/graphql"
  body:
    query: |-
      query {
        vna(
          date: "2026-03-19",
          strategy:  LOCAL_ONLY,
          ignoreCache: true
        ) {
          selicCode
          referenceDate
          price
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
