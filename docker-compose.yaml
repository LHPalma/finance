services:
  redis:
    image: redis:alpine
    container_name: redis-finance
    ports:
      - "6379:6379"
    volumes:
      - ./redis-data:/data/data

  postgres:
    image: postgres:15-alpine
    container_name: postgres-finance
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: finance
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 123
    volumes:
      - ./postgres-data:/data/var/lib/postgresql/data
